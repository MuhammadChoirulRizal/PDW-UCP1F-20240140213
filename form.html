<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Anggota</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Pendaftaran Anggota</h1>

    <nav>
        <a href="./index.html">Home</a>
        <a href="./form.html">Daftar</a>
        <a href="./gallery.html">Multimedia</a>
    </nav>
</header>

<section class="container">
    <form id="memberForm">
        <label>Nama</label>
        <input type="text" id="nama" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Bidang Minat</label>
        <select id="minat">
            <option>Web Development</option>
            <option>UI/UX Design</option>
            <option>Cyber Security</option>
            <option>Data Science</option>
        </select>

        <button type="submit">Daftar</button>
    </form>

    <div id="hasil"></div>
</section>

<script>
let dataAnggota = [];

document.getElementById("memberForm").addEventListener("submit", function(e){
    e.preventDefault();

    let nama = document.getElementById("nama").value;
    let email = document.getElementById("email").value;
    let minat = document.getElementById("minat").value;

    let anggotaBaru = {
        nama: nama,
        email: email,
        minat: minat
    };

    dataAnggota.push(anggotaBaru);

    document.getElementById("hasil").innerHTML = `
        <h3>Data Berhasil Diinput</h3>
        Nama: ${nama}<br>
        Email: ${email}<br>
        Minat: ${minat}
    `;

    alert("Data berhasil disimpan!");

    document.getElementById("memberForm").reset();

    console.log(dataAnggota);
});
</script>

</body>
</html>
